<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatch Forensic Assistant</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --bg-color: #020617;
            --surface: rgba(15, 23, 42, 0.4);
            --surface-solid: #0f172a;
            --surface-light: #1e293b;
            --border-color: rgba(30, 41, 59, 0.6);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --cyan: #22d3ee;
            --emerald: #34d399;
            --amber: #fbbf24;
            --rose: #fb7185;
            --purple: #c084fc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- Background Decorative Glows --- */
        .glow-1 {
            position: fixed;
            top: 0;
            left: 25%;
            width: 24rem;
            height: 24rem;
            background-color: rgba(79, 70, 229, 0.1);
            filter: blur(120px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .glow-2 {
            position: fixed;
            bottom: 0;
            right: 25%;
            width: 24rem;
            height: 24rem;
            background-color: rgba(34, 211, 238, 0.1);
            filter: blur(120px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        /* --- Layout & Utilities --- */
        .container {
            max-width: 72rem;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(12, 1fr);
            }
            .col-span-8 { grid-column: span 8; }
            .col-span-4 { grid-column: span 4; }
            .sticky-sidebar {
                position: sticky;
                top: 2rem;
            }
        }

        .flex { display: flex; }
        .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        
        .hidden { display: none !important; }
        .w-full { width: 100%; }

        /* --- Typography --- */
        h1, h2, h3 { font-weight: 700; color: #fff; }
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-4xl { font-size: 2.25rem; }
        .font-bold { font-weight: 700; }
        .font-black { font-weight: 900; }
        .text-muted { color: var(--text-muted); }

        /* --- Components --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        @media (min-width: 768px) {
            .card { padding: 2.5rem; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            border-radius: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            outline: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: var(--surface-light);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 1rem;
            padding: 1.25rem;
            font-family: inherit;
            resize: none;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: rgba(79, 70, 229, 0.5);
        }

        /* --- Specific UI Elements --- */
        header {
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            padding-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        @media (min-width: 768px) {
            header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        .logo-icon {
            padding: 0.625rem;
            background: var(--primary);
            border-radius: 0.75rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 1rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .risk-safe { color: var(--emerald); background: rgba(52, 211, 153, 0.1); }
        .risk-suspicious { color: var(--amber); background: rgba(251, 191, 36, 0.1); }
        .risk-malicious { color: var(--rose); background: rgba(251, 113, 133, 0.1); }

        .error-banner {
            background: rgba(225, 29, 72, 0.1);
            border: 1px solid rgba(225, 29, 72, 0.2);
            color: var(--rose);
            padding: 1rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        /* --- SVG Circle Progress --- */
        .circle-progress-container {
            position: relative;
            width: 10rem;
            height: 10rem;
            margin: 0 auto;
        }

        .circle-progress-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circle-bg {
            fill: none;
            stroke: rgba(30, 41, 59, 0.5);
            stroke-width: 12;
        }

        .circle-value {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 439.8; 
            stroke-dashoffset: 439.8;
            transition: stroke-dashoffset 1s ease-out, stroke 1s ease-out;
        }

        /* --- Evidence Lists --- */
        .evidence-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        @media (min-width: 768px) { .evidence-grid { grid-template-columns: 1fr 1fr; } }

        .evidence-item {
            background: #020617;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        /* --- Chat UI --- */
        .chat-container {
            background: var(--surface-solid);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.875rem;
        }
        .chat-user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .chat-bot { background: var(--surface-light); color: white; align-self: flex-start; border-bottom-left-radius: 0; }

        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="container">
        <header>
            <div class="flex items-center gap-3">
                <div class="logo-icon">
                    <i data-lucide="shield" style="color: white; width: 24px; height: 24px;"></i>
                </div>
                <div>
                    <h1 style="font-size: 1.5rem; letter-spacing: -0.05em; text-transform: uppercase;">
                        Net<span style="color: var(--primary);">Watch</span>
                    </h1>
                    <div class="flex items-center gap-2" style="font-size: 0.625rem; font-weight: 700; color: var(--text-muted);">
                        FORENSIC AUDIT ACTIVE
                    </div>
                </div>
            </div>
            <div style="font-size: 0.75rem; color: var(--text-muted);">
                <i data-lucide="globe"></i> Gemini Flash 2.5 Engine
            </div>
        </header>

        <div id="error-container" class="error-banner hidden">
            <i data-lucide="alert-circle"></i>
            <p id="error-text"></p>
        </div>

        <div class="grid">
            <div class="col-span-8 flex-col gap-6">
                <!-- Input -->
                <section class="card">
                    <h2 class="text-lg flex items-center gap-2 mb-4">
                        <i data-lucide="fingerprint" style="color: var(--primary);"></i>
                        Input Inspection
                    </h2>
                    <textarea id="main-input" rows="5" placeholder="Paste suspicious content here..."></textarea>
                    <div class="flex justify-between items-center mt-4">
                        <span id="char-count" class="text-muted" style="font-size: 0.75rem;">0 CHARS</span>
                        <button id="btn-analyze" class="btn btn-primary" onclick="analyzeLink()">
                            <i data-lucide="search" id="icon-search"></i>
                            <i data-lucide="refresh-cw" id="icon-spin" class="animate-spin hidden"></i>
                            <span id="btn-text">Run Audit</span>
                        </button>
                    </div>
                </section>

                <!-- Results -->
                <div id="results-container" class="hidden">
                    <div class="card mb-6">
                        <div class="flex items-center flex-wrap gap-8">
                            <div class="circle-progress-container">
                                <svg class="circle-progress-svg">
                                    <circle cx="80" cy="80" r="70" class="circle-bg"></circle>
                                    <circle cx="80" cy="80" r="70" class="circle-value" id="score-circle"></circle>
                                </svg>
                                <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                                    <span id="score-value" class="text-4xl font-black">0</span>
                                    <span class="text-muted" style="font-size: 0.6rem; font-weight: 700;">RISK</span>
                                </div>
                            </div>
                            <div style="flex: 1;">
                                <div id="risk-badge" class="badge mb-2">VERDICT</div>
                                <h2 id="verdict-summary" class="text-2xl mb-2"></h2>
                                <p id="coaching-advice" class="text-sm text-muted"></p>
                            </div>
                        </div>
                    </div>

                    <div class="evidence-grid">
                        <div class="card">
                            <h3 class="text-sm uppercase text-muted mb-4">Structural Evidence</h3>
                            <div id="structural-list"></div>
                        </div>
                        <div class="card">
                            <h3 class="text-sm uppercase text-muted mb-4">Tactical Evidence</h3>
                            <div id="tactical-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-4 flex-col gap-6 sticky-sidebar">
                <!-- Refactor -->
                <div id="refactor-container" class="card hidden">
                    <h3 class="text-sm flex items-center gap-2 mb-2">
                        <i data-lucide="sparkles" style="color: var(--cyan);"></i> Safe-Refactor
                    </h3>
                    <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 1rem;">Neutralize psychological triggers.</p>
                    <button class="btn btn-primary w-full" style="padding: 0.5rem;" onclick="generateSafeVersion()">Refactor Content</button>
                    <div id="refactor-result" class="hidden mt-4 p-3 bg-black rounded-lg text-sm italic"></div>
                </div>

                <!-- Chat -->
                <div class="chat-container">
                    <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 0.75rem;">
                        FORENSIC ASSISTANT
                    </div>
                    <div id="chat-messages" class="chat-messages">
                        <div class="chat-bubble chat-bot">Waiting for analysis report...</div>
                    </div>
                    <form onsubmit="handleChat(event)" style="padding: 1rem; display: flex; gap: 0.5rem; border-top: 1px solid var(--border-color);">
                        <input type="text" id="chat-input" placeholder="Ask follow-up..." class="text-sm" disabled style="padding: 0.5rem;">
                        <button type="submit" class="btn btn-primary" style="padding: 0.5rem;"><i data-lucide="send" style="width: 14px;"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyDTwdOhwvqdsZwNlS7JKydrHti98YK2Tlo";
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        let currentResult = null;

        lucide.createIcons();

        document.getElementById('main-input').addEventListener('input', (e) => {
            document.getElementById('char-count').textContent = `${e.target.value.length} CHARS`;
        });

        async function callGemini(prompt, systemInstruction, schema = null) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            if (schema) {
                payload.generationConfig = { responseMimeType: "application/json", responseSchema: schema };
            }

            for (let i = 0; i < 5; i++) {
                try {
                    const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    if (res.ok) {
                        const data = await res.json();
                        return data.candidates[0].content.parts[0].text;
                    }
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                } catch (e) {}
            }
            throw new Error("Analysis failed");
        }

        async function analyzeLink() {
            const input = document.getElementById('main-input').value.trim();
            if (!input) return;

            const btn = document.getElementById('btn-analyze');
            const searchIcon = document.getElementById('icon-search');
            const spinIcon = document.getElementById('icon-spin');
            
            btn.disabled = true;
            searchIcon.classList.add('hidden');
            spinIcon.classList.remove('hidden');

            const schema = {
                type: "OBJECT",
                properties: {
                    riskScore: { type: "INTEGER" },
                    riskLevel: { type: "STRING" },
                    verdictSummary: { type: "STRING" },
                    coachingAdvice: { type: "STRING" },
                    structuralEvidence: { type: "ARRAY", items: { type: "STRING" } },
                    tacticalEvidence: { type: "ARRAY", items: { type: "STRING" } }
                }
            };

            try {
                const response = await callGemini(`Analyze: ${input}`, "You are a cybersecurity expert. Provide forensic analysis in JSON.", schema);
                currentResult = JSON.parse(response);
                renderResults();
            } catch (e) {
                document.getElementById('error-container').classList.remove('hidden');
                document.getElementById('error-text').textContent = "Engine timeout. Please try a shorter snippet.";
            } finally {
                btn.disabled = false;
                searchIcon.classList.remove('hidden');
                spinIcon.classList.add('hidden');
            }
        }

        function renderResults() {
            document.getElementById('results-container').classList.remove('hidden');
            document.getElementById('refactor-container').classList.remove('hidden');
            document.getElementById('chat-input').disabled = false;
            
            const score = currentResult.riskScore;
            document.getElementById('score-value').textContent = score;
            
            const circle = document.getElementById('score-circle');
            circle.style.strokeDashoffset = 439.8 * (1 - score / 100);
            
            let color = '#34d399';
            if(score > 30) color = '#fbbf24';
            if(score > 70) color = '#fb7185';
            circle.style.stroke = color;

            const badge = document.getElementById('risk-badge');
            badge.textContent = currentResult.riskLevel;
            badge.className = `badge risk-${currentResult.riskLevel.toLowerCase()}`;

            document.getElementById('verdict-summary').textContent = currentResult.verdictSummary;
            document.getElementById('coaching-advice').textContent = currentResult.coachingAdvice;

            document.getElementById('structural-list').innerHTML = currentResult.structuralEvidence.map(e => `<div class="evidence-item">${e}</div>`).join('');
            document.getElementById('tactical-list').innerHTML = currentResult.tacticalEvidence.map(e => `<div class="evidence-item">${e}</div>`).join('');
            
            addChatMessage('bot', "Scan complete. How can I help you investigate this further?");
        }

        async function generateSafeVersion() {
            const resultBox = document.getElementById('refactor-result');
            resultBox.classList.remove('hidden');
            resultBox.textContent = "Neutralizing patterns...";
            const safe = await callGemini(`Rewrite safely: ${document.getElementById('main-input').value}`, "Rewrite the text professionally, removing manipulation and links.");
            resultBox.textContent = safe;
        }

        function addChatMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-bubble chat-${role}`;
            msgDiv.textContent = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function handleChat(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            addChatMessage('user', text);
            input.value = '';
            const res = await callGemini(`Question: ${text}. Context: ${JSON.stringify(currentResult)}`, "Answer concisely about the scan.");
            addChatMessage('bot', res);
        }
    </script>
</body>
</html>
